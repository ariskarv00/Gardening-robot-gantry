[gcode_macro DEMO_INTRICATE_GRID]
description: Show off Farmbot with intricate multi-axis motion inside 4x4 grid
gcode:
    # SAFETY: absolute, top height, gentle speeds
    G90
    G0 Y0 F4000
    G0 X70 Z25 F6000          ; near A1 front-left, safe height

    ################################################################
    # 1) DIAGONAL ACROSS GRID WITH Y BREATHING (A1 -> D4)
    ################################################################
    ; Approx corners from your POS macros:
    ; A1 ~ (X70,  Z25)
    ; B2 ~ (X287, Z262)
    ; C3 ~ (X506, Z508)
    ; D4 ~ (X724, Z730)

    ; move in three legs across diagonal, modulating Y between 0–220
    G1 X287 Z262 Y120 F7000   ; toward B2, Y up
    G1 X506 Z508 Y40  F7000   ; toward C3, Y down
    G1 X724 Z730 Y200 F7000   ; toward D4, Y up again
    G1 Y0 F4000               ; back to top at that corner

    ################################################################
    # 2) SPLINE-LIKE S-CURVE ALONG BACK EDGE (inside grid)
    ################################################################
    ; Work along back row approx Z ~ 730 but keep inside X[A..D]
    ; We’ll undulate X and Y slightly for a smooth demo.

    G0 Y160 F4000             ; mid Y, clear of plants
    G0 X724 Z730 F7000        ; back-right start (near D4)

    G1 X620 Z720 Y220 F6000
    G1 X540 Z700 Y140 F6000
    G1 X430 Z710 Y220 F6000
    G1 X320 Z725 Y140 F6000
    G1 X200 Z730 Y220 F6000
    G1 X70  Z720 Y160 F6000   ; end near back-left (A4 line)

    ################################################################
    # 3) CENTER LOOPS WITH Y OSCILLATION (around grid center)
    ################################################################
    ; Use approximate center near B2/C3 middle: X ~ 287–506, Z ~ 262–508
    ; We'll pick a central point and do two loops in relative mode.

    G0 X400 Z380 Y120 F7000   ; central demo point roughly in mid-grid

    G91                        ; relative moves for loops

    ; loop 1 – small square-ish orbit with Y breathing
    G1 X 40 Z  0 Y 40 F5000
    G1 X  0 Z 40 Y-30 F5000
    G1 X-40 Z  0 Y 40 F5000
    G1 X  0 Z-40 Y-30 F5000

    ; loop 2 – slightly larger
    G1 X 60 Z  0 Y 40 F5000
    G1 X  0 Z 60 Y-30 F5000
    G1 X-60 Z  0 Y 40 F5000
    G1 X  0 Z-60 Y-30 F5000

    G90                        ; back to absolute

    ################################################################
    # PARK NEAR CENTER AT TOP
    ################################################################
    G0 Y0 F4000
    G0 X400 Z380 F6000



