[include fluidd.cfg]
[mcu]
 serial: /dev/serial/by-id/usb-Klipper_rp2040_45503571290C9388-if00

[virtual_sdcard]
path: /home/pi/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[printer]
kinematics: cartesian
max_velocity: 85    ;max velocity 85 for Z-axis not to malfuction
max_accel: 400
max_z_velocity: 80
max_z_accel: 400

[homing_override]
axes: yxz
gcode:
    G28 Y # Y axis first for safety (vertical)
    G28 X # home X axis
    G28 Z # home Z axis
    
[gcode_arcs]
resolution: 1.0
#   An arc will be split into segments. Each segment's length will
#   equal the resolution in mm set above. Lower values will produce a
#   finer arc, but also more work for your machine. Arcs smaller than
#   the configured value will become straight lines. The default is
#   1mm.

[stepper_x]
step_pin: gpio11
dir_pin: !gpio10
enable_pin: !gpio12
microsteps: 16
rotation_distance: 20   # CALIBRATION FORMULA: RD'=RD*(Lmeasured/Lreal),  
endstop_pin: !gpio4        # Lmeasured= the 'wrong' one, Lreal= real measured
position_endstop: 0
position_max: 730
homing_speed: 65
second_homing_speed: 10

[tmc2209 stepper_x]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 0
run_current: 0.8
hold_current: 0.6
stealthchop_threshold: 999999

[stepper_y]
step_pin: gpio6
dir_pin: !gpio5
enable_pin: !gpio7
microsteps: 16
rotation_distance: 3.8
endstop_pin: !gpio3
position_endstop: 0
position_max: 315  
homing_speed: 35  
second_homing_speed: 10 


[tmc2209 stepper_y]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 2
run_current: 0.8
hold_current: 0.6
stealthchop_threshold: 999999
diag_pin: ^gpio3
driver_SGTHRS: 100

[stepper_z]
step_pin: gpio19
dir_pin: gpio28
enable_pin: !gpio2
microsteps: 16
rotation_distance: 20
endstop_pin: !gpio25
position_endstop: 0
position_min: -2.0
position_max: 730
homing_speed: 55
second_homing_speed: 10
homing_retract_dist: 5.0


[tmc2209 stepper_z]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 1
run_current: 1.2
hold_current: 0.6
stealthchop_threshold: 999999

[extruder]
step_pin: gpio14
dir_pin: !gpio13
enable_pin: !gpio15
microsteps: 16
rotation_distance: 14 ;So that mm translates into mL
nozzle_diameter: 0.4
filament_diameter: 1.75
heater_pin: gpio23
sensor_type: EPCOS 100K B57560G104F
sensor_pin: gpio27
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: -25 
max_temp: 20
max_extrude_cross_section:2
min_extrude_temp:-25
max_extrude_only_distance: 50000.0   ; or some value larger than the longest pump cycle you expect
max_extrude_cross_section: 10000.0      ; or even higher if you need greater flow
max_extrude_only_velocity: 600.0    # mm/s  — start conservative for a pump
max_extrude_only_accel: 2000.0    # mm/s^2 — reasonable starting accel

[tmc2209 extruder]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 3
run_current: 1.00
hold_current: 0.800
stealthchop_threshold: 0

[gcode_macro MOVE_TO_PUMP_CALIBRATION_POSITION_B2]
description: Go to position and down to calibrate pump
gcode:
    G90
    G0 Y0 F4000
    G0 X287 Z230 F9999
    G0 Y300 F4000

[gcode_macro WATER_PLANT_CENTER]
description: Dispense water using peristaltic pump (slow start)
gcode:
    {% set volume = params.VOLUME|default(100)|float %}
    {% set flow_rate = params.FLOW_RATE|default(2000)|float %}

    ; CALIBRATION: mm of E per ml
    {% set e_per_ml = 4.1 %}
    {% set e_total = volume * e_per_ml %}

    {% set e_start = 10.0 %}
    {% set e_start = e_start if e_start < e_total else e_total %}
    {% set e_rest = e_total - e_start %}

    M83                     ; Relative extruder mode

    ; Slow start (anti-stall)
    G1 E{e_start} F500

    ; Normal watering
    {% if e_rest > 0 %}
        G1 E{e_rest} F{flow_rate}
    {% endif %}

    G4 P1000                ; Let flow finish
    M82                     ; Absolute extruder mode


[gcode_macro WATER_AFTER_PLANTING]
description: Water seed after planting with slow start then fast flow
gcode:
    ; --- Move nozzle to watering height ---
    G90
    G0 Y200 F4000

    ; --- Slow priming phase (5 ml at low speed) ---
    {% set slow_volume = 5 %}
    {% set slow_flow = 500 %}
    {% set slow_e = slow_volume * 2 %}   ; CALIBRATED: mm per ml

    M83
    G1 E{slow_e} F{slow_flow}
    G4 P500

    ; --- Main watering phase (55 ml at high speed) ---
    {% set fast_volume = 55 %}
    {% set fast_flow = 3000 %}
    {% set fast_e = fast_volume * 2 %}

    G1 E{fast_e} F{fast_flow}
    G4 P1000
    M82


[servo Seeder]
pin: gpio29          # g-code command  SET_SERVO SERVO=Seeder ANGLE=180
maximum_servo_angle: 180
#   The maximum angle (in degrees) that this servo can be set to. The
#   default is 180 degrees.
#initial_angle:
#   Initial angle (in degrees) to set the servo to. The default is to
#   not send any signal at startup.

[gcode_macro DROP_SEED]
description: Drop seed at current position 
gcode:
    G4 P500  
      SET_SERVO SERVO=Seeder ANGLE=180  ; Rotate to release seed
      G4 P500                    ; Brief pause for seed to drop
      SET_SERVO SERVO=Seeder ANGLE=0    ; Return to closed position
    G4 P500  


[gcode_macro DROP_SEED_WITH_VIBRATION]
description: Drop seed at current position with vibration to free stuck pellets
gcode:
    # Small delay before starting
    G4 P500  

    ################################################################
    # 1) PRE-DROP VIBRATION AROUND CLOSED POSITION (0°)
    ################################################################
    
    SET_SERVO SERVO=Seeder ANGLE=70
    G4 P100                    ; Brief pause
    SET_SERVO SERVO=Seeder ANGLE=0
    G4 P100                    ; Brief pause
    SET_SERVO SERVO=Seeder ANGLE=70
    G4 P100                    ; Brief pause
    SET_SERVO SERVO=Seeder ANGLE=0
    G4 P100                    ; Brief pause
    SET_SERVO SERVO=Seeder ANGLE=70
    G4 P100                    ; Brief pause
    SET_SERVO SERVO=Seeder ANGLE=0
    G4 P100                    ; Brief pause
    SET_SERVO SERVO=Seeder ANGLE=70
    G4 P100                    ; Brief pause
    SET_SERVO SERVO=Seeder ANGLE=0
    G4 P50                    ; Brief pause
    SET_SERVO SERVO=Seeder ANGLE=70
    G4 P100                    ; Brief pause
    SET_SERVO SERVO=Seeder ANGLE=0
    G4 P100                    ; Brief pause
    SET_SERVO SERVO=Seeder ANGLE=70
    G4 P100                    ; Brief pause
    SET_SERVO SERVO=Seeder ANGLE=0
    G4 P100                    ; Brief pause

    SET_SERVO SERVO=Seeder ANGLE=180      ; Rotate to release seed
    

    G4 P800    ; brief pause for seed to drop

    SET_SERVO SERVO=Seeder ANGLE=0    ; Return to closed position


    G4 P500    ; end delay

[gcode_macro PLANT_SEED_WITH_HOLE_FIRST]
description: Plant seed at current position, making a hole first
gcode:
    G91
    G0 X10 F4000               ; Move X above the hole
    G90

    G0 Y312 F9999              ; Move down to make a hole
    G0 Y285 F4000              ; Move up begin seed drop sequence
    
    G91                        ; 
    G0 X-10 F4000               ; Move X above the hole
    G90
    
    G4 P500  
    SET_SERVO SERVO=Seeder ANGLE=180  ; Rotate to release seed
    G4 P500                           ; Brief pause for seed to drop
    SET_SERVO SERVO=Seeder ANGLE=0    ; Return to closed position
    G4 P500 

    G91
    G0 X-10 F4000                 ; Move back to begin covering the hole
    G0 Y25 F4000                ; Start covering the hole   
    G0 X10 F4000                 ; Cover the hole
    G90   

    G0 Y0 F4000               ; Move back up
    

[gcode_macro SQUARE_MOVEMENT_AROUND_CENTER]
description: Centered square in XZ around current position. Goes to Y150 first.
gcode:
    ; D = side length of square (your "diameter")
    {% set d = params.D|default(50)|float %}
    {% set h = d / 2.0 %}
    {% set neg_h = -h %}
    {% set neg_d = -d %}
    {% set f = params.F|default(5000)|float %}

    ; Go to watering height first (absolute)
    G90
    G0 Y150 F4000

    ; Now do the square around the start point in relative mode
    G91

    ; Your exact pattern, but parametric:
    ; z +h
    G0 Z{h} F{f}
    ; x +h
    G0 X{h} F{f}
    ; z -d
    G0 Z{neg_d} F{f}
    ; x -d
    G0 X{neg_d} F{f}
    ; z +d
    G0 Z{d} F{f}
    ; x +h
    G0 X{h} F{f}
    ; z -h  (back to center)
    G0 Z{neg_h} F{f}

    G90

[gcode_macro WATER_SQUARE_ONLY_FOR_BORDERS]
description: ONLY FOR TOP AND BOTTOM WHERE Z MOVEMENT IS LIMITED!! Water in centered square with fixed pump speed and fast XY movement
gcode:
    SAVE_GCODE_STATE NAME=WATER_SQUARE_FRONT_ROW_STATE

    # -------------------------------
    # PARAMETERS
    # -------------------------------
    {% set volume = params.VOLUME|default(100)|float %}   # ml
    {% set flow = params.FLOW_RATE|default(2000)|float %} # pump + motion speed (mm/min)
    {% set slow_start_flow = 400 %}
    {% set d = params.D|default(30)|float %}              # square side length (mm)
    {% set h = d / 2.0 %}
    {% set neg_h = -h %}
    {% set neg_d = -d %}
    {% set move_f = 4000 %}                               # X/Z movement speed (rapids)

    # -------------------------------
    # PUMP CALIBRATION (E per ml)
    # -------------------------------
    {% set e_per_ml = 4.1 %}
    {% set e_total = volume * e_per_ml %}

    # slow prime amount
    {% set e_start = 10.0 %}
    {% if e_start > e_total %}
        {% set e_start = e_total %}
    {% endif %}
    {% set e_move = e_total - e_start %}

    # --------------------------------
    # CONSTANT FLOW:
    # Total path length of the square:
    # segments: h, d, d, d, h  → 4d
    # So we do E proportional to distance:
    # e_per_mm = e_move / (4d)
    # --------------------------------
    {% set e_per_mm = e_move / (4.0 * d) %}
    {% set e_short = e_per_mm * h %}      # for h-length segments
    {% set e_long  = e_per_mm * d %}      # for d-length segments

    # -------------------------------
    # MOVE TO WATERING HEIGHT
    # -------------------------------
    G90
    G0 Y150 F4000
    G91
    G0 Z-20 F4000

    # -------------------------------
    # PRIME PUMP (slow start)
    # -------------------------------
    M83
    G1 E{e_start} F{slow_start_flow}

    # -------------------------------
    # TRACE THE SQUARE (centered)
    # Same F for all water moves,
    # E scaled by distance → constant flow.
    # -------------------------------
    G0 Z{h}              F{move_f}
    G1 X{h}     E{e_short} F{flow}   ; short edge (h)
    G1 Z{neg_d} E{e_long}  F{flow}   ; long edge (d)
    G1 X{neg_d} E{e_long}  F{flow}   ; long edge (d)
    G1 Z{d}     E{e_long}  F{flow}   ; long edge (d)
    G1 X{h}     E{e_short} F{flow}   ; short edge (h)
    G0 Z{neg_h}          F{move_f}   ; back to center

    # -------------------------------
    # CLEANUP
    # -------------------------------
    G90
    G4 P1000
    M82

    RESTORE_GCODE_STATE NAME=WATER_SQUARE_FRONT_ROW_STATE

[gcode_macro WATERING_SQUARE_MOVEMENT]
description: Water in centered square with fixed pump speed and fast XY movement
gcode:
    SAVE_GCODE_STATE NAME=WATER_SQUARE_STATE

    # -------------------------------
    # PARAMETERS
    # -------------------------------
    {% set volume = params.VOLUME|default(100)|float %}   # ml
    {% set flow = params.FLOW_RATE|default(2000)|float %} # pump + motion speed (mm/min)
    {% set slow_start_flow = 400 %}
    {% set d = params.D|default(100)|float %}              # square side length (mm)
    {% set h = d / 2.0 %}
    {% set neg_h = -h %}
    {% set neg_d = -d %}
    {% set move_f = 4000 %}                               # X/Z movement speed (rapids)

    # -------------------------------
    # PUMP CALIBRATION (E per ml)
    # -------------------------------
    {% set e_per_ml = 4.1 %}
    {% set e_total = volume * e_per_ml %}

    # slow prime amount
    {% set e_start = 15.0 %}
    {% if e_start > e_total %}
        {% set e_start = e_total %}
    {% endif %}
    {% set e_move = e_total - e_start %}

    # --------------------------------
    # CONSTANT FLOW:
    # Total path length of the square:
    # segments: h, d, d, d, h  → 4d
    # So we do E proportional to distance:
    # e_per_mm = e_move / (4d)
    # --------------------------------
    {% set e_per_mm = e_move / (4.0 * d) %}
    {% set e_short = e_per_mm * h %}      # for h-length segments
    {% set e_long  = e_per_mm * d %}      # for d-length segments

    # -------------------------------
    # MOVE TO WATERING HEIGHT
    # -------------------------------
    G90
    G0 Y150 F4000
    G91
    G0 Z-50 X-20 F4000

    # -------------------------------
    # PRIME PUMP (slow start)
    # -------------------------------
    M83
    G1 E{e_start} F{slow_start_flow}

    # -------------------------------
    # TRACE THE SQUARE (centered)
